{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Collective Prayer</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #fff7ed;
            color: #333;
        }

        .container {
            max-width: 1000px;
            margin: 30px auto;
            padding: 20px;
        }

        .card {
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-align: center;
        }

        h1 {
            color: #b45309;
            margin-bottom: 10px;
        }

        .time {
            font-size: 22px;
            font-weight: bold;
            color: #92400e;
        }

        input[type=text] {
            width: 90%;
            max-width: 700px;
            padding: 14px;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 16px;
            margin-top: 15px;
        }

        button {
            background: #d97706;
            color: white;
            border: none;
            padding: 12px 22px;
            border-radius: 8px;
            font-size: 16px;
            margin: 10px 5px;
            cursor: pointer;
        }

        button:hover {
            background: #b45309;
        }

        .youtube-btn {
            background: #dc2626;
        }

        .youtube-btn:hover {
            background: #b91c1c;
        }

        .video-wrapper {
            position: relative;
            width: 100%;
            padding-bottom: 56.25%;
            margin-top: 25px;
            background: #1a1a1a;
            border-radius: 12px;
            overflow: hidden;
        }

        .video-wrapper div, .video-wrapper iframe {
            position: absolute;
            width: 100%;
            height: 100%;
            left: 0;
            top: 0;
            border: none;
        }

        #status {
            margin-top: 20px;
            font-weight: bold;
            color: #92400e;
            padding: 10px;
            border-radius: 6px;
        }
        
        .error-status {
            color: #b91c1c !important;
            background: #fef2f2;
            border: 1px solid #fca5a5;
        }

        .quote {
            margin-top: 25px;
            font-style: italic;
            color: #92400e;
        }

        .note {
            color: #666;
            margin-top: 10px;
        }
    </style>
</head>

<body>

<div class="container">
    <div class="card">

        <h1>Collective Prayer</h1>
        <p class="time">Daily Prayer Time: 9:00 PM</p>

        <p>Paste a YouTube Video or Playlist URL.</p>

        <input
            type="text"
            id="youtubeUrl"
            value="https://www.youtube.com/playlist?list=PLfhs93SSoxqw77PEVaGBji2FqNj189aXl"
            placeholder="Paste YouTube playlist or video URL">

        <br>

        <button onclick="loadYouTube()">Start Prayer</button>
        <button onclick="clearPlayer()">Clear</button>

        <a
            id="youtubeLink"
            href="https://www.youtube.com/playlist?list=PLfhs93SSoxqw77PEVaGBji2FqNj189aXl"
            target="_blank">
            <button class="youtube-btn" type="button">Open in YouTube</button>
        </a>

        <p class="note">If the playlist cannot be embedded, click "Open in YouTube".</p>

        <div class="video-wrapper">
            <div id="youtubePlayer"></div>
        </div>

        <div id="status">Ready. Click "Start Prayer" to begin.</div>

        <p class="quote">“When there is unity in prayer, there is peace in the family.”</p>

    </div>
</div>

<script src="https://www.youtube.com/iframe_api"></script>

<script>
const DEFAULT_PLAYLIST = "PLfhs93SSoxqw77PEVaGBji2FqNj189aXl";
let player = null;

// Global callback for the YouTube API frame initialization
function onYouTubeIframeAPIReady() {
    console.log("YouTube API Ready");
}

function loadYouTube() {
    const input = document.getElementById("youtubeUrl");
    const status = document.getElementById("status");
    const youtubeLink = document.getElementById("youtubeLink");

    if (!input || !status || !youtubeLink) return;

    status.className = ""; 
    let urlInput = input.value.trim();
    
    if (!urlInput) {
        urlInput = "https://www.youtube.com/playlist?list=" + DEFAULT_PLAYLIST;
        input.value = urlInput;
    }

    youtubeLink.href = urlInput;

    try {
        let targetId = "";
        let isPlaylist = false;

        // Extract ID depending on link layout rule configurations
        if (urlInput.includes("list=")) {
            const urlParams = new URLSearchParams(urlInput.split('?')[1] || urlInput.split('#')[1]);
            targetId = urlParams.get("list");
            isPlaylist = true;
        } 
        else if (urlInput.includes("v=")) {
            const urlParams = new URLSearchParams(urlInput.split('?')[1]);
            targetId = urlParams.get("v");
        } 
        else if (urlInput.includes("youtu.be/")) {
            const segments = urlInput.split("youtu.be/");
            targetId = segments[1].split(/[?#]/)[0];
        } 
        else if (urlInput.length >= 11) {
            targetId = urlInput;
            isPlaylist = urlInput.length > 15; 
        }

        if (!targetId) {
            status.innerText = "Invalid YouTube URL format.";
            status.className = "error-status";
            return;
        }

        // Wipe out the prior frame cleanly before re-binding 
        if (player) {
            try { player.destroy(); } catch(err) {}
            player = null;
        }

        const wrapper = document.querySelector('.video-wrapper');
        wrapper.innerHTML = '<div id="youtubePlayer"></div>';

        // Base configuration setup object
        let playerConfig = {
            height: '100%',
            width: '100%',
            playerVars: {
                'autoplay': 1,
                'rel': 0
            },
            events: {
                'onReady': function(event) {
                    status.innerText = isPlaylist ? "Prayer playlist loaded." : "Prayer video loaded.";
                    event.target.playVideo();
                },
                'onError': function(event) {
                    // Catches error configurations natively (Error 153 embedding bans)
                    status.innerText = "Embedding restricted by owner. Click 'Open in YouTube' to play.";
                    status.className = "error-status";
                }
            }
        };

        // Distribute parameters correctly
        if (isPlaylist) {
            playerConfig.playerVars.listType = 'playlist';
            playerConfig.playerVars.list = targetId;
        } else {
            playerConfig.videoId = targetId;
        }

        // Spin up the application player
        player = new YT.Player('youtubePlayer', playerConfig);

    } catch (e) {
        status.innerText = "Error parsing URL variables.";
        status.className = "error-status";
    }
}

function clearPlayer() {
    if (player) {
        try { player.destroy(); } catch(err) {}
        player = null;
    }
    const wrapper = document.querySelector('.video-wrapper');
    if (wrapper) wrapper.innerHTML = '<div id="youtubePlayer"></div>';
    
    const input = document.getElementById("youtubeUrl");
    const status = document.getElementById("status");
    if (input) input.value = "";
    if (status) {
        status.innerText = "Player cleared.";
        status.className = "";
    }
}

/* 9 PM reminder tracking interval */
let lastReminderDate = "";
setInterval(function () {
    const now = new Date();
    const today = now.toDateString();

    if (
        now.getHours() === 21 &&
        now.getMinutes() === 0 &&
        lastReminderDate !== today
    ) {
        lastReminderDate = today;
        alert("It is 9:00 PM. Time for Collective Prayer.");
        
        const status = document.getElementById("status");
        if(status) status.innerText = "It is 9:00 PM. Time for Collective Prayer.";
        
        loadYouTube();
    }
}, 30000);
</script>

</body>
</html>
