<script>

const DEFAULT_PLAYLIST =
"https://www.youtube.com/playlist?list=PLfhs93SSoxqw77PEVaGBji2FqNj189aXl";

function loadYouTube() {
    const input = document.getElementById("youtubeUrl");
    const iframe = document.getElementById("youtubePlayer");
    const status = document.getElementById("status");
    const youtubeLink = document.getElementById("youtubeLink");

    let url = input.value.trim();

    if (!url) {
        url = DEFAULT_PLAYLIST;
        input.value = DEFAULT_PLAYLIST;
    }

    youtubeLink.href = url;

    try {
        const parsedUrl = new URL(url);
        let embedUrl = "";
        
        // Add a timestamp cache-buster token (&t=) to force a completely clean frame load
        const cacheBuster = "&t=" + new Date().getTime();

        if (parsedUrl.searchParams.has("list")) {
            const listId = parsedUrl.searchParams.get("list");
            embedUrl = "https://www.youtube.com/embed/videoseries?list=" + listId + "&autoplay=1" + cacheBuster;
            status.innerText = "Prayer playlist loaded.";
        }
        else if (
            parsedUrl.hostname.includes("youtube.com") &&
            parsedUrl.searchParams.has("v")
        ) {
            const videoId = parsedUrl.searchParams.get("v");
            embedUrl = "https://www.youtube.com/embed/" + videoId + "?autoplay=1" + cacheBuster;
            status.innerText = "Prayer video loaded.";
        }
        else if (parsedUrl.hostname.includes("youtu.be")) {
            const videoId = parsedUrl.pathname.replace("/", "");
            embedUrl = "https://www.youtube.com/embed/" + videoId + "?autoplay=1" + cacheBuster;
            status.innerText = "Prayer video loaded.";
        }
        else {
            status.innerText = "Invalid YouTube URL.";
            return;
        }

        iframe.src = embedUrl;

    } catch (e) {
        status.innerText = "Invalid YouTube URL.";
    }
}

function clearPlayer() {
    document.getElementById("youtubePlayer").src = "";
    document.getElementById("youtubeUrl").value = "";
    document.getElementById("status").innerText = "Player cleared.";
}

// Ensure the source remains completely blank on load
window.onload = function() {
    document.getElementById("youtubePlayer").src = ""; 
    document.getElementById("status").innerText = "Ready. Click 'Start Prayer' to begin.";
};

/* 9 PM reminder */
let lastReminderDate = "";
setInterval(function () {
    const now = new Date();
    const today = now.toDateString();

    if (
        now.getHours() === 21 &&
        now.getMinutes() === 0 &&
        lastReminderDate !== today
    ) {
        lastReminderDate = today;
        alert("It is 9:00 PM. Time for Collective Prayer.");
        document.getElementById("status").innerText = "It is 9:00 PM. Time for Collective Prayer.";
        loadYouTube();
    }
}, 30000);

</script>
